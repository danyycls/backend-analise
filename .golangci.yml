run:
  timeout: 5m
  tests: true
  go: "1.25"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive
  disable:
    - typecheck

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
    exclude-functions:
      - "net/http.(*Response).Body.Close"
      - "io.ReadAll"
      - "encoding/json.Marshal"
      - "strconv.Atoi"
      - "net/url.Parse"
      - "os.Setenv"
  gocritic:
    enabled-checks:
      - rangeExprCopy
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: error-return
      - name: error-strings
      - name: indent-error-flow
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unreachable-code
      - name: superfluous-else

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - dataCSV
  exclude:
    - "Error return value of `.*\\.Close` is not checked"
    - "Error return value of `.*\\.WriteMessage` is not checked"
    - "Error return value of `.*\\.WriteJSON` is not checked"
    - "Error return value of `.*Terminate` is not checked"
    - "Error return value of `.*\\.Rollback` is not checked"
