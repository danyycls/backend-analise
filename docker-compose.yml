services:
  banco:
    image: postgres:15-alpine
    container_name: postgres_tse
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tse_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_podp
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: swagger_podp
    ports:
      - "8082:8080"
    volumes:
      - ./api:/api
    environment:
      SWAGGER_JSON: /api/openapi.yaml

  inicializador_banco:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inicializador_banco_tse
    depends_on:
      banco:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: banco
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tse_data
    command: ["./inicializador_banco"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
