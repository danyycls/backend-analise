components:
  schemas:
    Erro:
      type: object
      properties:
        erro:
          type: string
          description: "Mensagem de erro"
      required:
        - erro

    DadosWrapper:
      type: object
      properties:
        dados:
          description: "Dados da resposta (tipo varia por endpoint)"

    JobResponse:
      type: object
      properties:
        jobId:
          type: string
          description: "Identificador unico do job assincrono"
        status:
          type: string
          enum: [processing]
        total:
          type: integer
      required:
        - jobId
        - status

    BatchOrgaoResponse:
      type: object
      properties:
        status:
          type: string
          enum: [completed, processing]
        results:
          type: array
          items:
            type: object
        message:
          type: string

    AnaliseOrgaoPNCPRequest:
      type: object
      properties:
        cnpjs:
          type: array
          items:
            type: string
          minItems: 1
        dataInicial:
          type: string
        dataFinal:
          type: string
      required:
        - cnpjs
        - dataInicial
        - dataFinal

