openapi: "3.0.3"

info:
  title: "LICEU API"
  description: >
    API de analise e cruzamento de dados publicos brasileiros.
    Integra dados de multiplas fontes governamentais: TSE, TCU,
    Portal da Transparencia, PNCP, Congresso Nacional (Camara e Senado),
    IBGE e SICONFI.
  version: "0.1.0"
  contact:
    name: "LICEU"
    url: "https://github.com/danyele/podp"

servers:
  - url: "http://localhost:8080"
    description: "Desenvolvimento local"

tags:
  - name: Importacao
    description: "Importacao de dados CSV do TSE"

  - name: PNCP
    description: "Portal Nacional de Contratacoes Publicas"

  - name: Busca
    description: "Busca e relacionamentos (TSE, contexto politico)"

  - name: TCU
    description: "Tribunal de Contas da Uniao"

  - name: Deputados
    description: "Camara dos Deputados"

  - name: Senado
    description: "Senado Federal"

  - name: IBGE
    description: "Instituto Brasileiro de Geografia e Estatistica"

  - name: Estado
    description: "Dados da esfera estadual"

  - name: Municipio
    description: "Dados da esfera municipal"

  - name: PortalTransparencia
    description: "Portal da Transparencia do Governo Federal"

  - name: Entidade
    description: "Consulta de entidades (candidatos, fornecedores, doadores)"

paths:
  # ─── Importacao ──────────────────────────────────────────────
  /import:
    post:
      tags: [Importacao]
      summary: "Executa importacao de dados CSV do TSE"
      operationId: executarImportacao
      responses:
        "200":
          description: "Stream SSE com eventos de progresso. Content-Type: text/event-stream"
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: "Erro interno"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  # ─── PNCP ────────────────────────────────────────────────────
  /orgao/analise:
    post:
      tags: [PNCP]
      summary: "Inicia analise de orgaos PNCP"
      operationId: analisarOrgaoPNCP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnaliseOrgaoPNCPRequest"
      responses:
        "202":
          description: "Analise iniciada (processamento assincrono)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          description: "Dados invalidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /orgao/analise/stream/{jobId}:
    get:
      tags: [PNCP]
      summary: "WebSocket stream do progresso da analise"
      operationId: streamAnaliseOrgao
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "101":
          description: "Upgrade para WebSocket"

  /orgao/analise/batch/{jobId}:
    get:
      tags: [PNCP]
      summary: "Resultados batch da analise de orgaos"
      operationId: batchAnaliseOrgao
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Resultados ou status de processamento"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchOrgaoResponse"

  /publicacao/analise:
    post:
      tags: [PNCP]
      summary: "Inicia analise de publicacoes PNCP"
      operationId: analisarPublicacao
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalisePublicacaoRequest"
      responses:
        "202":
          description: "Analise iniciada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"

  /publicacao/analise/stream/{jobId}:
    get:
      tags: [PNCP]
      summary: "WebSocket stream do progresso da analise de publicacoes"
      operationId: streamAnalisePublicacao
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "101":
          description: "Upgrade para WebSocket"

  /publicacao/analise/batch/{jobId}:
    get:
      tags: [PNCP]
      summary: "Resultados batch da analise de publicacoes"
      operationId: batchAnalisePublicacao
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Resultados ou status"
          content:
            application/json:
              schema:
                type: object

  /ibge/municipios/{uf}:
    get:
      tags: [IBGE]
      summary: "Lista municipios por UF (via IBGE)"
      operationId: listarMunicipiosIBGE
      parameters:
        - name: uf
          in: path
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
      responses:
        "200":
          description: "Lista de municipios"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "400":
          description: "UF invalida"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  # ─── Busca / Contexto / Relacoes ─────────────────────────────
  /busca/contexto:
    post:
      tags: [Busca]
      summary: "Analisa ligacao politica a partir de licitacoes"
      operationId: analisarContextoPolitico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LigacaoPoliticaRequest"
      responses:
        "200":
          description: "Resultado da analise de ligacao politica"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LigacaoPoliticaResponse"
        "400":
          description: "Dados invalidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /busca/relacoes:
    post:
      tags: [Busca]
      summary: "Busca relacoes de um CNPJ (fornecedores, doadores, despesas, receitas)"
      operationId: buscarRelacoes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuscaRelacoesRequest"
      responses:
        "200":
          description: "Relacoes encontradas"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelacoesResponse"
        "400":
          description: "Dados invalidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /entidade:
    post:
      tags: [Entidade]
      summary: "Consulta entidade por tipo e chave"
      operationId: consultarEntidade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultaEntidadeRequest"
      responses:
        "200":
          description: "Entidade encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultaEntidadeResponse"
        "400":
          description: "Dados invalidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          description: "Entidade nao encontrada"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  # ─── TCU ─────────────────────────────────────────────────────
  /tcu/contas-irregulares:
    post:
      tags: [TCU]
      summary: "Busca contas irregulares no TCU"
      operationId: buscarContasIrregulares
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TCUFilterRequest"
      responses:
        "200":
          description: "Lista de contas irregulares"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /tcu/fins-eleitorais:
    post:
      tags: [TCU]
      summary: "Busca condenacoes para fins eleitorais no TCU"
      operationId: buscarFinsEleitorais
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TCUFilterRequest"
      responses:
        "200":
          description: "Lista de condenacoes"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /tcu/inabilitados:
    post:
      tags: [TCU]
      summary: "Busca inabilitados no TCU"
      operationId: buscarInabilitados
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TCUFilterRequest"
      responses:
        "200":
          description: "Lista de inabilitados"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /tcu/inidoneos:
    post:
      tags: [TCU]
      summary: "Busca inidoneos no TCU"
      operationId: buscarInidoneos
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TCUFilterRequest"
      responses:
        "200":
          description: "Lista de inidoneos"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  # ─── Busca TSE ───────────────────────────────────────────────
  /busca/cargos:
    get:
      tags: [Busca]
      summary: "Lista cargos disponiveis no TSE"
      operationId: listarCargosTSE
      responses:
        "200":
          description: "Lista de cargos"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /busca/partidos:
    get:
      tags: [Busca]
      summary: "Lista partidos politicos"
      operationId: listarPartidos
      responses:
        "200":
          description: "Lista de partidos"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /busca/candidatos:
    post:
      tags: [Busca]
      summary: "Busca candidatos no TSE"
      operationId: buscarCandidatos
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuscaCandidatosRequest"
      responses:
        "200":
          description: "Resultado da busca de candidatos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidatosResponse"

  /busca/doadores:
    post:
      tags: [Busca]
      summary: "Busca doadores por documento"
      operationId: buscarDoadores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuscaDocumentoRequest"
      responses:
        "200":
          description: "Doador encontrado"
          content:
            application/json:
              schema:
                type: object

  /busca/fornecedores:
    post:
      tags: [Busca]
      summary: "Busca fornecedores por documento"
      operationId: buscarFornecedores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuscaDocumentoRequest"
      responses:
        "200":
          description: "Fornecedor encontrado"
          content:
            application/json:
              schema:
                type: object

  # ─── Deputados ───────────────────────────────────────────────
  /deputados:
    get:
      tags: [Deputados]
      summary: "Lista deputados ativos"
      operationId: listarDeputadosAtivos
      parameters:
        - name: siglaPartido
          in: query
          schema:
            type: string
        - name: siglaUf
          in: query
          schema:
            type: string
      responses:
        "200":
          description: "Lista de deputados ativos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /deputados/{id}/completo:
    get:
      tags: [Deputados]
      summary: "Busca detalhes completos de um deputado"
      operationId: buscarDetalhesDeputado
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Detalhes do deputado"
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "ID invalido"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /deputados/{id}/despesas:
    get:
      tags: [Deputados]
      summary: "Busca despesas de um deputado"
      operationId: buscarDespesasDeputado
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tipoDespesa
          in: query
          schema:
            type: string
        - name: cnpjCpfFornecedor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: "Despesas do deputado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /deputados/{id}/orgaos:
    get:
      tags: [Deputados]
      summary: "Busca orgaos associados a um deputado"
      operationId: buscarOrgaosDeputado
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Orgaos associados"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  # ─── Senado ──────────────────────────────────────────────────
  /senado/senadores:
    get:
      tags: [Senado]
      summary: "Lista senadores"
      operationId: listarSenadores
      responses:
        "200":
          description: "Lista de senadores"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/senadores/{codigo}/completo:
    get:
      tags: [Senado]
      summary: "Busca dados completos de um senador"
      operationId: buscarSenador
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Dados do senador"
          content:
            application/json:
              schema:
                type: object

  /senado/senadores/{codigo}/cargos:
    get:
      tags: [Senado]
      summary: "Lista cargos de um senador"
      operationId: listarCargosSenador
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Cargos do senador"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/senadores/{codigo}/comissoes:
    get:
      tags: [Senado]
      summary: "Lista comissoes de um senador"
      operationId: listarComissoesSenador
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Comissoes do senador"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/senadores/{codigo}/mandatos:
    get:
      tags: [Senado]
      summary: "Lista mandatos de um senador"
      operationId: listarMandatosSenador
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Mandatos do senador"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/orcamento:
    get:
      tags: [Senado]
      summary: "Lista itens de orcamento do Senado"
      operationId: listarOrcamento
      responses:
        "200":
          description: "Itens de orcamento"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/processos:
    get:
      tags: [Senado]
      summary: "Lista processos do Senado"
      operationId: listarProcessos
      responses:
        "200":
          description: "Processos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/processo/assuntos:
    get:
      tags: [Senado]
      summary: "Lista assuntos de processos"
      operationId: listarProcessoAssuntos
      responses:
        "200":
          description: "Assuntos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/processo/emendas:
    get:
      tags: [Senado]
      summary: "Lista emendas de processos"
      operationId: listarProcessoEmendas
      responses:
        "200":
          description: "Emendas"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/processo/{id}:
    get:
      tags: [Senado]
      summary: "Busca processo por ID"
      operationId: buscarProcesso
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Detalhes do processo"
          content:
            application/json:
              schema:
                type: object

  /senado/votacoes:
    get:
      tags: [Senado]
      summary: "Lista votacoes"
      operationId: listarVotacoes
      responses:
        "200":
          description: "Votacoes"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/votacoes/comissao/{sigla}:
    get:
      tags: [Senado]
      summary: "Votacoes por comissao"
      operationId: listarVotacoesComissao
      parameters:
        - name: sigla
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Votacoes da comissao"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/votacoes/parlamentar/{codigo}:
    get:
      tags: [Senado]
      summary: "Votacoes por parlamentar"
      operationId: listarVotacoesParlamentar
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Votacoes do parlamentar"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/materia/tramitacao:
    get:
      tags: [Senado]
      summary: "Tramitacao de materias"
      operationId: listarMateriaTramitacao
      responses:
        "200":
          description: "Tramitacoes"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/agenda/dia/{data}:
    get:
      tags: [Senado]
      summary: "Agenda diaria do Senado"
      operationId: listarAgendaDia
      parameters:
        - name: data
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Agenda do dia"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/agenda/mes/{data}:
    get:
      tags: [Senado]
      summary: "Agenda mensal do Senado"
      operationId: listarAgendaMes
      parameters:
        - name: data
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Agenda do mes"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/encontro/{codigo}:
    get:
      tags: [Senado]
      summary: "Busca encontro (reuniao)"
      operationId: buscarEncontro
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Detalhes do encontro"
          content:
            application/json:
              schema:
                type: object

  /senado/comissoes:
    get:
      tags: [Senado]
      summary: "Lista todas as comissoes"
      operationId: listarComissoes
      responses:
        "200":
          description: "Comissoes"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /senado/comissoes/{codigo}:
    get:
      tags: [Senado]
      summary: "Busca comissao por codigo"
      operationId: buscarComissao
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Comissao"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  # ─── IBGE ────────────────────────────────────────────────────
  /ibge/estados:
    get:
      tags: [IBGE]
      summary: "Lista estados brasileiros"
      operationId: listarEstados
      responses:
        "200":
          description: "Lista de estados"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /ibge/municipios-populacao/{uf}:
    get:
      tags: [IBGE]
      summary: "Lista municipios com dados populacionais"
      operationId: listarMunicipiosPopulacao
      parameters:
        - name: uf
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Municipios com populacao"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  # ─── Estado ──────────────────────────────────────────────────
  /estado/{uf}/dados-completos:
    get:
      tags: [Estado]
      summary: "Busca dados completos de um estado"
      operationId: buscarDadosCompletosEstado
      parameters:
        - name: uf
          in: path
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
      responses:
        "200":
          description: "Dados completos do estado"
          content:
            application/json:
              schema:
                type: object
        "400":
          description: "UF invalida"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /estado/{uf}/basico:
    get:
      tags: [Estado]
      summary: "Busca dados basicos de um estado"
      operationId: buscarBasicoEstado
      parameters:
        - name: uf
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Dados basicos do estado"
          content:
            application/json:
              schema:
                type: object

  /estado/{uf}/candidatos:
    get:
      tags: [Estado]
      summary: "Busca candidatos de um estado"
      operationId: buscarCandidatosEstado
      parameters:
        - name: uf
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Candidatos do estado"
          content:
            application/json:
              schema:
                type: object

  /estado/{uf}/deputados:
    get:
      tags: [Estado]
      summary: "Busca deputados de um estado"
      operationId: buscarDeputadosEstado
      parameters:
        - name: uf
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Deputados do estado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DadosWrapper"

  /estado/{uf}/senadores:
    get:
      tags: [Estado]
      summary: "Busca senadores de um estado"
      operationId: buscarSenadoresEstado
      parameters:
        - name: uf
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Senadores do estado"
