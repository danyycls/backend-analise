name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.25"

jobs:
  fmt:
    name: Formatação
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            /*
            !/dataCSV
          sparse-checkout-cone-mode: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Verificar formatação
        run: |
          files=$(find . -path ./dataCSV -prune -o -name '*.go' -print)
          test -z "$(gofmt -l $files)" || (echo "Arquivos precisam ser formatados. Rode 'make fix'."; exit 1)

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            /*
            !/dataCSV
          sparse-checkout-cone-mode: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            /*
            !/dataCSV
          sparse-checkout-cone-mode: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Executar go vet
        run: go vet $(go list ./... | grep -v /dataCSV)

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            /*
            !/dataCSV
          sparse-checkout-cone-mode: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Compilar binário
        run: go build -o /dev/null .
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            /*
            !/dataCSV
          sparse-checkout-cone-mode: false
      - name: Construir imagem Docker
        run: docker build -t podp .


